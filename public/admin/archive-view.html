<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Quiz Archive View</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.container{
max-width:900px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

button{

padding:10px 18px;

border:none;

border-radius:6px;

background:#1976d2;

color:#fff;

cursor:pointer;

margin-bottom:20px;

}

.question{

border:1px solid #ddd;

border-radius:8px;

padding:15px;

margin-bottom:15px;

}

.answer{

margin-top:10px;

color:green;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<button onclick="history.back()">

⬅ Back

</button>

<h2 id="title">

Quiz Archive

</h2>

<br>

<div id="questions">

Loading...

</div>

</div>

<script src="archive-view.js"></script>

</body>

</html>
