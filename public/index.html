<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTET LIVE QUIZ</title>
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="container">
        
        <h1>CTET LIVE QUIZ</h1>
        
        <!-- नाम -->
        <div id="loginBox">
            <h2>अपना नाम लिखें</h2>
            
            <input type="text" id="studentName" placeholder="नाम">
            
            <button onclick="startQuiz()">
                Start Quiz
            </button>
        </div>
        
        <!-- Quiz -->
        <div id="quizBox" style="display:none;">
            
            <div class="top">
                <span id="questionNumber">Question 1</span>
                <span id="score">Score : 0</span>
            </div>
            
            <div id="question" class="question"></div>
            
            <div id="options" class="options"></div>
            
            <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
                Next
            </button>
            
        </div>
        
        <!-- Leaderboard -->
        
        <div id="leaderboardBox" style="display:none;">
            
            <h2>Leaderboard</h2>
            
            <div id="leaderboard"></div>
            
            <button onclick="continueQuiz()">
                Continue
            </button>
            
        </div>
        
        <!-- Result -->
        
        <div id="resultBox" style="display:none;">
            
            <h2>Quiz Finished</h2>
            
            <h3 id="finalName"></h3>
            
            <h2 id="finalScore"></h2>
            
            <h3>Final Leaderboard</h3>
            
            <div id="finalLeaderboard"></div>
            
        </div>
        
    </div>
    
    
    <!-- Sounds -->
    
    <audio id="correctSound">
        <source src="sounds/correct.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="wrongSound">
        <source src="sounds/wrong.mp3" type="audio/mpeg">
    </audio>
    
    <script src="script.js"></script>
    
</body>

</html>
