<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CTET Question Setter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.container{

    max-width:900px;

    margin:20px auto;

    background:#fff;

    padding:20px;

    border-radius:10px;

    box-shadow:0 0 10px rgba(0,0,0,.15);

}

h2,h3{

    margin:15px 0;

}

textarea,
input,
select{

    width:100%;

    padding:10px;

    margin-top:8px;

    margin-bottom:10px;

    font-size:16px;

}

textarea{

    resize:vertical;

}

button{

    width:100%;

    padding:12px;

    margin-top:8px;

    border:none;

    border-radius:6px;

    cursor:pointer;

    font-size:16px;

    background:#1976d2;

    color:white;

}

button:hover{

    background:#1258a8;

}

.question-card{

    border:1px solid #ddd;

    border-radius:8px;

    padding:12px;

    margin-top:10px;

}

.delete{

    background:#d32f2f;

}

.delete:hover{

    background:#b71c1c;

}

</style>

</head>

<body>

<div class="container">

<h2>CTET Question Setter</h2>

<!-- Bulk Paste -->

<h3>Bulk Paste</h3>

<textarea
id="bulkInput"
rows="12"
placeholder="ChatGPT से बना हुआ प्रश्न यहाँ Paste करें"></textarea>

<button onclick="autoFillQuestion()">
Auto Fill
</button>

<button onclick="bulkImport()">
🚀 Import All Questions
</button>

<hr>

<h3>Question Details</h3>

<input
id="quizTitle"
placeholder="Quiz Title">

<textarea
id="questionHindi"
placeholder="Question Hindi"></textarea>

<textarea
id="questionEnglish"
placeholder="Question English"></textarea>

<input
id="a_hi"
placeholder="Option A Hindi">

<input
id="a_en"
placeholder="Option A English">

<input
id="b_hi"
placeholder="Option B Hindi">

<input
id="b_en"
placeholder="Option B English">

<input
id="c_hi"
placeholder="Option C Hindi">

<input
id="c_en"
placeholder="Option C English">

<input
id="d_hi"
placeholder="Option D Hindi">

<input
id="d_en"
placeholder="Option D English">

<select id="answer">

<option value="0">Correct Answer A</option>

<option value="1">Correct Answer B</option>

<option value="2">Correct Answer C</option>

<option value="3">Correct Answer D</option>

</select>

<button onclick="saveQuestion()">
💾 Save Question
</button>

<button
style="background:#d32f2f"
onclick="resetLeaderboard()">
🗑 Reset Leaderboard
</button>

<hr>

<h3>Today's Questions</h3>

<div id="list"></div>

</div>

<script src="app.js"></script>

<script src="parser.js"></script>

<script src="crud.js"></script>

<script src="bulk-import.js"></script>

<script src="leaderboard.js"></script>

</body>

</html>
